<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR 空間羅盤 V17 (極簡比例刻度版)</title>
    <style>
      /* 禁用預設長按選單與選取 */
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: "Courier New", Courier, monospace;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 100;
        pointer-events: none;
      }

      /* 魔術師專用熱區：右下角 120x120 */
      #magician-zone {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 120px;
        height: 120px;
        z-index: 200;
        pointer-events: auto;
      }

      /* 1. 狙擊十字瞄準鏡 */
      #crosshair {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
      }
      .line-v {
        position: absolute;
        top: 0;
        left: 50%;
        width: 1px;
        height: 100%;
        background: rgba(52, 211, 153, 0.4);
      }
      .line-h {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        background: rgba(52, 211, 153, 0.4);
      }
      .center-circle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 1px solid rgba(52, 211, 153, 0.6);
        border-radius: 50%;
      }

      /* 極簡偽裝刻度線 (1x, 2x, 3x) */
      .tick-h-line {
        position: absolute;
        left: 50%;
        width: 16px;
        height: 2px;
        background: rgba(52, 211, 153, 0.6);
        transform: translate(-50%, -50%);
      }
      .tick-v-line {
        position: absolute;
        top: 50%;
        width: 2px;
        height: 16px;
        background: rgba(52, 211, 153, 0.6);
        transform: translate(-50%, -50%);
      }

      /* Y軸刻度：最內圈 90px (撲克牌高度) */
      .t-y1 {
        top: calc(50% - 90px);
      }
      .t-y2 {
        top: calc(50% - 180px);
      }
      .t-y3 {
        top: calc(50% - 270px);
      }
      .t-y-1 {
        top: calc(50% + 90px);
      }
      .t-y-2 {
        top: calc(50% + 180px);
      }
      .t-y-3 {
        top: calc(50% + 270px);
      }

      /* X軸刻度：最內圈 64px (撲克牌寬度) */
      .t-x1 {
        left: calc(50% - 64px);
      }
      .t-x2 {
        left: calc(50% - 128px);
      }
      .t-x3 {
        left: calc(50% - 192px);
      }
      .t-x-1 {
        left: calc(50% + 64px);
      }
      .t-x-2 {
        left: calc(50% + 128px);
      }
      .t-x-3 {
        left: calc(50% + 192px);
      }

      /* 巨型雷達底座 */
      #radar-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 150vmax;
        height: 150vmax;
        border-radius: 50%;
        border: 2px solid rgba(52, 211, 153, 0.1);
        pointer-events: none;
      }

      /* 掃描光束 */
      #radar-sweep {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(52, 211, 153, 0) 0%,
          rgba(52, 211, 153, 0.05) 60%,
          rgba(52, 211, 153, 0.5) 100%
        );
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      /* 觀眾觸發的長按 SCAN 按鈕 */
      #circle-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(2, 44, 34, 0.8);
        border: 2px solid #34d399;
        color: #34d399;
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.4),
          inset 0 0 15px rgba(52, 211, 153, 0.3);
        pointer-events: auto;
        overflow: hidden;
        transition: transform 0.1s, opacity 0.3s;
      }
      #circle-btn:active {
        transform: translate(-50%, -50%) scale(0.95);
      }

      #btn-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0%;
        background: rgba(52, 211, 153, 0.6);
        z-index: 1;
      }
      .btn-text {
        position: relative;
        z-index: 2;
      }

      #status-text {
        position: absolute;
        top: 40px;
        width: 100%;
        text-align: center;
        color: #34d399;
        font-size: 14px;
        opacity: 0.8;
        letter-spacing: 4px;
      }
    </style>

    <script
      async
      src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="overlay">
      <div id="crosshair">
        <div class="line-v"></div>
        <div class="line-h"></div>
        <div class="center-circle"></div>

        <div class="tick-h-line t-y1"></div>
        <div class="tick-h-line t-y2"></div>
        <div class="tick-h-line t-y3"></div>
        <div class="tick-h-line t-y-1"></div>
        <div class="tick-h-line t-y-2"></div>
        <div class="tick-h-line t-y-3"></div>

        <div class="tick-v-line t-x1"></div>
        <div class="tick-v-line t-x2"></div>
        <div class="tick-v-line t-x3"></div>
        <div class="tick-v-line t-x-1"></div>
        <div class="tick-v-line t-x-2"></div>
        <div class="tick-v-line t-x-3"></div>
      </div>

      <div id="status-text">SYSTEM STANDBY...</div>

      <div id="radar-container">
        <div id="radar-sweep"></div>
      </div>

      <button id="circle-btn">
        <div id="btn-fill"></div>
        <span class="btn-text">SCAN</span>
      </button>
    </div>

    <div id="magician-zone"></div>

    <script type="module">
      import * as THREE from "three";
      import { ARButton } from "three/addons/webxr/ARButton.js";

      let camera, scene, renderer, targetMarker;
      let targetPoint = new THREE.Vector3();
      let dotMat, ringMat;

      let circleBtn = document.getElementById("circle-btn");
      let btnFill = document.getElementById("btn-fill");
      let statusText = document.getElementById("status-text");
      let radarSweep = document.getElementById("radar-sweep");

      let appState = 0;

      let isPressing = false;
      let pressStartTime = 0;

      let isFlashing = false;
      let flashStartTime = 0;
      let lastFlashTriggerTime = 0;

      // 記錄雷達是否已經掃過目標點一次
      let hasSweptOnce = false;

      init();

      function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          70,
          window.innerWidth / window.innerHeight,
          0.01,
          20
        );
        scene.add(camera);

        const markerGroup = new THREE.Group();

        const dotGeo = new THREE.SphereGeometry(0.005, 16, 16);
        dotMat = new THREE.MeshBasicMaterial({
          color: 0x34d399,
          transparent: true,
          opacity: 0.5,
        });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        markerGroup.add(dot);

        const ringGeo = new THREE.RingGeometry(0.008, 0.011, 32);
        ringMat = new THREE.MeshBasicMaterial({
          color: 0x34d399,
          transparent: true,
          opacity: 0.3,
          side: THREE.DoubleSide,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        markerGroup.add(ring);

        markerGroup.visible = false;
        scene.add(markerGroup);
        targetMarker = markerGroup;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        document.body.appendChild(
          ARButton.createButton(renderer, {
            optionalFeatures: ["dom-overlay"],
            domOverlay: { root: document.body },
          })
        );

        // ==========================================
        // 1. 魔術師暗中鎖定
        // ==========================================
        document
          .getElementById("magician-zone")
          .addEventListener("pointerdown", (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (appState === 0) {
              targetPoint.set(0, 0, -0.3);
              camera.localToWorld(targetPoint);
              targetMarker.position.copy(targetPoint);

              appState = 1;
              if (navigator.vibrate) navigator.vibrate(50);
            } else if (appState === 2) {
              appState = 0;
              targetMarker.visible = false;
              isFlashing = false;
              isPressing = false;
              hasSweptOnce = false;

              radarSweep.style.opacity = "0";
              circleBtn.style.opacity = "1";
              circleBtn.style.pointerEvents = "auto";
              btnFill.style.height = "0%";
              statusText.innerText = "SYSTEM STANDBY...";

              if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            }
          });

        // ==========================================
        // 2. 觀眾觸發 SCAN 按鈕 (長按邏輯)
        // ==========================================
        circleBtn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (appState === 1) {
            isPressing = true;
            pressStartTime = 0;
            if (navigator.vibrate) navigator.vibrate(30);
          }
        });

        const cancelPress = (e) => {
          if (isPressing) {
            isPressing = false;
            btnFill.style.height = "0%";
          }
        };
        window.addEventListener("pointerup", cancelPress);
        circleBtn.addEventListener("pointerleave", cancelPress);
        circleBtn.addEventListener("contextmenu", (e) => e.preventDefault());

        renderer.setAnimationLoop(render);
      }

      function render(timestamp, frame) {
        if (frame) {
          if (isPressing) {
            if (pressStartTime === 0) pressStartTime = timestamp;
            let elapsed = timestamp - pressStartTime;
            let progress = Math.min(elapsed / 2000, 1.0);
            btnFill.style.height = progress * 100 + "%";

            if (progress >= 1.0) {
              isPressing = false;
              appState = 2;

              circleBtn.style.opacity = "0";
              circleBtn.style.pointerEvents = "none";
              statusText.innerText = "RADAR SCANNING SPATIAL ANOMALY...";

              radarSweep.style.opacity = "1";

              // 掃描開始時，標記點仍然保持隱藏
              targetMarker.visible = false;
              hasSweptOnce = false;

              if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
          } else if (appState === 1) {
            pressStartTime = 0;
            btnFill.style.height = "0%";
          }

          const radarSpeed = 2500;
          const radarAngle =
            ((timestamp % radarSpeed) / radarSpeed) * Math.PI * 2;

          if (appState === 2) {
            radarSweep.style.transform = `rotate(${radarAngle}rad)`;

            const vector = targetPoint.clone();
            vector.project(camera);

            if (vector.z < 1) {
              let targetAngle = Math.atan2(vector.x, vector.y);
              if (targetAngle < 0) targetAngle += Math.PI * 2;

              let angleDiff = Math.abs(radarAngle - targetAngle);
              if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

              // 當雷達掃過標記點
              if (angleDiff < 0.2) {
                if (!isFlashing && timestamp - lastFlashTriggerTime > 2000) {
                  isFlashing = true;
                  hasSweptOnce = true;
                  flashStartTime = timestamp;
                  lastFlashTriggerTime = timestamp;

                  if (navigator.vibrate) navigator.vibrate([50, 150, 50]);
                }
              }
            }

            // --- 光點顯示邏輯 ---
            if (isFlashing) {
              targetMarker.visible = true;
              let elapsed = timestamp - flashStartTime;
              let phase = Math.floor(elapsed / 150);

              if (phase === 0 || phase === 2) {
                targetMarker.scale.set(2.5, 2.5, 2.5);
                dotMat.opacity = 1.0;
                ringMat.opacity = 1.0;
              } else if (phase === 1 || phase === 3) {
                targetMarker.scale.set(1.0, 1.0, 1.0);
                dotMat.opacity = 0.5;
                ringMat.opacity = 0.3;
              } else {
                isFlashing = false;
              }
            } else if (hasSweptOnce) {
              targetMarker.visible = true;
              targetMarker.scale.set(1.0, 1.0, 1.0);
              dotMat.opacity = 0.5;
              ringMat.opacity = 0.3;
            } else {
              targetMarker.visible = false;
            }
          }
        }
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
